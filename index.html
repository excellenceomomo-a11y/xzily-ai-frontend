<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XZILY AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 250px;
  background: #0a0a0a;
  padding: 10px;
  border-right: 1px solid #222;
  overflow-y: auto;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #2563eb;
  border: none;
  color: white;
  border-radius: 8px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.bubble {
  max-width: 70%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

.user-bubble {
  background: #2563eb;
  align-self: flex-end;
}

.ai-bubble {
  background: #1f2937;
  align-self: flex-start;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="createChat()">+ New Chat</button>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
  <div id="chatList"></div>
</div>

<div class="main">
  <div id="chatBox" class="chat-box"></div>

  <div class="input-area">
    <input id="input" placeholder="Message XZILY..." />

    <button onclick="send()">➤</button>
    <button onclick="startVoice()">🎤</button>
    <button onclick="speakLast()">🔊</button>

    <input type="file" id="fileInput" onchange="uploadFile(event)" hidden>
    <button onclick="fileInput.click()">📄</button>

    <input type="file" id="imageInput" accept="image/*" onchange="uploadImage(event)" hidden>
    <button onclick="imageInput.click()">🖼️</button>
  </div>
</div>

<script>
const API = "https://xzily-ai.onrender.com";

let currentChatId = null;

/* AUTH */
async function login() {
  const username = prompt("Username:");
  const password = prompt("Password:");

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username,password})
  });

  const data = await res.json();
  localStorage.setItem("token", data.token);
  alert("Logged in!");
}

async function register() {
  const username = prompt("Create username:");
  const password = prompt("Create password:");

  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username,password})
  });

  alert("Account created!");
}

/* CHAT UI */
function addMessage(role, text) {
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");

  div.className = "bubble " + (role === "user" ? "user-bubble" : "ai-bubble");
  box.appendChild(div);

  if (role === "assistant") {
    let i = 0;
    const interval = setInterval(() => {
      div.innerText += text[i];
      i++;
      if (i >= text.length) clearInterval(interval);
      box.scrollTop = box.scrollHeight;
    }, 15);
  } else {
    div.innerText = text;
  }
}

/* SEND MESSAGE */
async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage("user", message);
  input.value = "";

  try {
    const res = await fetch(API + "/chat", {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": localStorage.getItem("token")
      },
      body: JSON.stringify({ message, chatId: currentChatId })
    });

    const data = await res.json();
    currentChatId = data.chatId;

    addMessage("assistant", data.reply);

  } catch {
    addMessage("assistant", "Error connecting to server.");
  }
}

/* FILE UPLOAD */
async function uploadFile(e) {
  const file = e.target.files[0];
  const formData = new FormData();
  formData.append("file", file);

  addMessage("user", "📄 " + file.name);
  addMessage("assistant", "Reading file...");

  const res = await fetch(API + "/upload", {
    method: "POST",
    headers: {"Authorization": localStorage.getItem("token")},
    body: formData
  });

  const data = await res.json();
  addMessage("assistant", data.reply);
}

/* IMAGE */
async function uploadImage(e) {
  const file = e.target.files[0];
  const formData = new FormData();
  formData.append("image", file);

  addMessage("user", "🖼️ " + file.name);
  addMessage("assistant", "Analyzing image...");

  const res = await fetch(API + "/upload-image", {
    method: "POST",
    headers: {"Authorization": localStorage.getItem("token")},
    body: formData
  });

  const data = await res.json();
  addMessage("assistant", data.reply);
}

/* VOICE */
function startVoice() {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.onresult = e => document.getElementById("input").value = e.results[0][0].transcript;
  rec.start();
}

function speakLast() {
  const last = document.querySelectorAll(".ai-bubble");
  if (!last.length) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(last[last.length-1].innerText));
}

/* CHAT LIST */
async function loadChats() {
  const res = await fetch(API + "/chats", {
    headers: {"Authorization": localStorage.getItem("token")}
  });

  const chats = await res.json();
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(chat => {
    const div = document.createElement("div");
    div.innerText = chat.title || "Chat";
    div.onclick = () => loadChat(chat);
    list.appendChild(div);
  });
}

function loadChat(chat) {
  currentChatId = chat._id;
  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  chat.messages.forEach(m => addMessage(
    m.role === "user" ? "user" : "assistant",
    m.content
  ));
}

function createChat() {
  currentChatId = null;
  document.getElementById("chatBox").innerHTML = "";
}

loadChats();
</script>

</body>
</html>
