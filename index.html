<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XZILY AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  display: flex;
}

#sidebar {
  width: 250px;
  background: #111;
  padding: 10px;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
}

.user { background: #1a1a1a; }
.ai { background: #0f1a14; }

#input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

#user-input {
  flex: 1;
  padding: 10px;
}

button {
  margin-left: 5px;
  cursor: pointer;
}

#login-modal {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  padding: 20px;
  border: 1px solid #333;
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="chat-list"></div>
</div>

<div id="main">
  <div id="messages"></div>

  <div id="input-area">
    <input id="user-input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
    <input type="file" id="fileInput" />
  </div>
</div>

<div id="login-modal" style="display:none;">
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script>
const BASE_URL = "https://xzily-ai-backend-8.onrender.com";

let token = localStorage.getItem("xzily_token");
let currentChatId = null;
let pendingFile = null;
let ttsEnabled = true;

// UI
function appendMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

// AUTH
function openModal() {
  document.getElementById("login-modal").style.display = "block";
}

async function login() {
  const res = await fetch(BASE_URL + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();
  token = data.token;
  localStorage.setItem("xzily_token", token);
  document.getElementById("login-modal").style.display = "none";
  loadChats();
}

async function register() {
  await fetch(BASE_URL + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });
  alert("Registered. Now login.");
}

// CHAT
async function sendMessage() {
  const input = document.getElementById("user-input");
  const text = input.value.trim();

  if (!token) return openModal();
  if (!text && !pendingFile) return;

  appendMessage("user", text);
  input.value = "";

  try {
    const res = await fetch(BASE_URL + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({
        message: text,
        chatId: currentChatId
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || "Error");

    currentChatId = data.chatId;
    appendMessage("ai", data.reply);

    if (ttsEnabled) speak(data.reply);

    loadChats();

  } catch (err) {
    appendMessage("ai", "⚠️ " + err.message);
  }
}

function newChat() {
  currentChatId = null;
  document.getElementById("messages").innerHTML = "";
}

async function loadChats() {
  if (!token) return;

  const res = await fetch(BASE_URL + "/chats", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const list = document.getElementById("chat-list");
  list.innerHTML = "";

  data.chats.forEach(chat => {
    const div = document.createElement("div");
    div.innerText = chat.title;
    div.onclick = () => loadChat(chat);
    list.appendChild(div);
  });
}

function loadChat(chat) {
  currentChatId = chat._id;
  const messages = document.getElementById("messages");
  messages.innerHTML = "";

  chat.messages.forEach(m => {
    appendMessage(m.role === "user" ? "user" : "ai", m.content);
  });
}

// FILE
document.getElementById("fileInput").addEventListener("change", (e) => {
  pendingFile = e.target.files[0];
  if (pendingFile && pendingFile.type.startsWith("image/")) {
    uploadImage(pendingFile);
  }
});

async function uploadImage(file) {
  const form = new FormData();
  form.append("image", file);

  const res = await fetch(BASE_URL + "/upload-image", {
    method: "POST",
    headers: { Authorization: "Bearer " + token },
    body: form
  });

  const data = await res.json();
  appendMessage("ai", data.reply);
}

// VOICE
function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Voice not supported");

  const rec = new SpeechRecognition();
  rec.onresult = e => {
    document.getElementById("user-input").value = e.results[0][0].transcript;
  };
  rec.start();
}

function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utter);
}

// INIT
if (token) loadChats();
</script>

</body>
  </html>
