<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XZILY AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS VARIABLES ── */
    :root {
      --bg:        #080808;
      --surface:   #111111;
      --surface2:  #181818;
      --border:    #222222;
      --border2:   #2a2a2a;
      --accent:    #00ff88;
      --accent2:   #00cc6a;
      --accent-dim:#00ff8822;
      --text:      #f0f0f0;
      --text-muted:#666666;
      --text-dim:  #444444;
      --user-bg:   #1a1a1a;
      --ai-bg:     #0f1a14;
      --red:       #ff4444;
      --yellow:    #ffcc00;
      --radius:    14px;
      --sidebar:   260px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ══════════════════════════════
       SIDEBAR
    ══════════════════════════════ */
    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 100;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { color: #000; }

    .logo-text {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    #new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.03em;
    }

    #new-chat-btn:hover {
      background: #00ff8830;
      transform: translateY(-1px);
    }

    #new-chat-btn:active { transform: translateY(0); }

    /* Chat History */
    .sidebar-section-label {
      padding: 14px 16px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    #chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .chat-item {
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
    }

    .chat-item:hover { background: var(--surface2); color: var(--text); }

    .chat-item.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .chat-item-icon { font-size: 14px; flex-shrink: 0; opacity: 0.5; }
    .chat-item-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }

    /* Sidebar Footer */
    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .auth-buttons { display: flex; flex-direction: column; gap: 8px; }

    .btn-auth {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    #login-btn {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
    }
    #login-btn:hover { border-color: var(--accent); color: var(--accent); }

    #register-btn {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }
    #register-btn:hover { background: var(--accent2); }

    /* Logged-in user info */
    #user-info {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: var(--surface2);
    }

    .user-avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
    }

    .user-details { flex: 1; overflow: hidden; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-label { font-size: 11px; color: var(--text-muted); }

    #logout-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      display: flex; align-items: center;
    }
    #logout-btn:hover { color: var(--red); }

    /* ══════════════════════════════
       MAIN AREA
    ══════════════════════════════ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Top bar */
    #topbar {
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #chat-title {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .topbar-actions { display: flex; gap: 8px; }

    .topbar-btn {
      width: 34px; height: 34px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 14px;
    }
    .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Hamburger for mobile */
    #hamburger { display: none; }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
    }

    .messages-inner {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Welcome Screen */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px 24px;
    }

    .welcome-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent) 0%, #00aaff 100%);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-logo svg { color: #000; width: 36px; height: 36px; }

    .welcome-title {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .welcome-title span { color: var(--accent); }

    .welcome-sub {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 480px;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .capability-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 520px;
      width: 100%;
    }

    .capability-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }

    .capability-card:hover {
      border-color: var(--accent);
      background: var(--ai-bg);
      transform: translateY(-2px);
    }

    .cap-icon { font-size: 20px; margin-bottom: 8px; }
    .cap-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .cap-desc { font-size: 12px; color: var(--text-muted); }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      animation: fadeSlideIn 0.3s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      font-family: var(--font-head);
    }

    .msg-row.ai .msg-avatar {
      background: linear-gradient(135deg, var(--accent) 0%, #00aaff 100%);
      color: #000;
    }

    .msg-row.user .msg-avatar {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .msg-bubble {
      max-width: calc(100% - 52px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      position: relative;
    }

    .msg-row.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--border2);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* Code blocks inside bubbles */
    .msg-bubble pre {
      background: #0a0a0a;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      font-size: 13px;
      margin: 10px 0;
    }

    .msg-bubble code {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      background: #1a1a1a;
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }

    .msg-bubble pre code {
      background: none;
      padding: 0;
      color: #d4f5e4;
    }

    /* Typing indicator */
    .typing-dot {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dot span {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 16px 24px 24px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .input-container {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 14px 56px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    #file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-chip {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-chip-remove {
      cursor: pointer;
      color: var(--text-dim);
      transition: color 0.15s;
    }
    .file-chip-remove:hover { color: var(--red); }

    #user-input {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      resize: none;
      max-height: 200px;
      min-height: 24px;
      line-height: 1.6;
    }

    #user-input::placeholder { color: var(--text-dim); }

    .input-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .input-tools { display: flex; gap: 4px; }

    .tool-btn {
      width: 32px; height: 32px;
      background: none;
      border: none;
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 15px;
    }

    .tool-btn:hover { background: var(--surface2); color: var(--text); }
    .tool-btn.active { color: var(--accent); background: var(--accent-dim); }

    #send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: var(--border2); color: var(--text-dim); transform: none; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 10px;
    }

    /* Hidden file inputs */
    #file-input, #image-input { display: none; }

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px; height: 32px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-size: 18px;
    }
    .modal-close:hover { background: var(--surface2); color: var(--text); }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }

    .form-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 6px;
      display: none;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .modal-switch a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .modal-switch a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      z-index: 2000;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success { border-color: var(--accent); color: var(--accent); }
    #toast.error   { border-color: var(--red);    color: var(--red); }

    /* Sidebar overlay for mobile */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }

      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay { display: block; }
      #hamburger { display: flex; }

      #welcome .capability-grid {
        grid-template-columns: 1fr;
        max-width: 320px;
      }

      .welcome-title { font-size: 26px; }

      #input-area { padding: 12px 16px 20px; }
      #messages { padding: 20px 0; }
      .messages-inner { padding: 0 16px; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <div class="logo-text">XZ<span>ILY</span></div>
      </div>
      <button id="new-chat-btn" oncli
